# 실행: docker-compose -f 05.Streamlit/05-4.docker-compose.yml up --build
# 중지: docker-compose -f 05.Streamlit/05-4.docker-compose.yml down

services:
  backend:
    build:
      context: ..                          # 빌드 컨텍스트: 프로젝트 루트
      dockerfile: 05.Streamlit/05-3.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../Data:/app/Data                  # PDF 및 캐시 파일 유지
      - ../vectorDB:/app/vectorDB          # 벡터 DB 영구 저장
    env_file:
      - ../.env                            # OPENAI_API_KEY, BACKEND_API_KEY
    restart: unless-stopped
